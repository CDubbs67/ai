<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Ask any question and get instant answers. A beautiful Q&A search engine for general knowledge.">
    <title>AskNova — Instant Answers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main id="app">
        <header class="header" id="header">
            <a href="index.html" class="logo"
                style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:10px;">
                <span class="logo-icon">✦</span>
                <span class="logo-text">AskNova</span>
            </a>
            <nav
                style="display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:30px;padding:4px;">
                <a href="index.html"
                    style="font-family:inherit;font-size:0.85rem;font-weight:500;text-decoration:none;padding:8px 18px;border-radius:26px;background:linear-gradient(135deg,var(--gradient-1),var(--gradient-2));color:white;">Search</a>
                <a href="review.html"
                    style="font-family:inherit;font-size:0.85rem;font-weight:500;text-decoration:none;padding:8px 18px;border-radius:26px;color:var(--text-muted);transition:var(--transition);">Review</a>
            </nav>
            <button class="theme-picker-btn" id="theme-picker-btn" aria-label="Change background">
                🎨
            </button>
        </header>

        <div class="theme-panel" id="theme-panel">
            <div class="theme-panel-header">
                <span class="theme-panel-title">Choose Background</span>
                <button class="theme-panel-close" id="theme-panel-close">✕</button>
            </div>
            <div class="theme-options">
                <button class="theme-swatch active" data-theme="nova" title="Nova (Default)">
                    <span class="swatch-colors"
                        style="background:linear-gradient(135deg,#7c5cfc,#c084fc,#f472b6)"></span>
                    <span class="swatch-name">Nova</span>
                </button>
                <button class="theme-swatch" data-theme="ocean" title="Ocean">
                    <span class="swatch-colors"
                        style="background:linear-gradient(135deg,#0ea5e9,#06b6d4,#22d3ee)"></span>
                    <span class="swatch-name">Ocean</span>
                </button>
                <button class="theme-swatch" data-theme="sunset" title="Sunset">
                    <span class="swatch-colors"
                        style="background:linear-gradient(135deg,#f97316,#f59e0b,#ef4444)"></span>
                    <span class="swatch-name">Sunset</span>
                </button>
                <button class="theme-swatch" data-theme="forest" title="Forest">
                    <span class="swatch-colors"
                        style="background:linear-gradient(135deg,#22c55e,#10b981,#059669)"></span>
                    <span class="swatch-name">Forest</span>
                </button>
                <button class="theme-swatch" data-theme="midnight" title="Midnight">
                    <span class="swatch-colors"
                        style="background:linear-gradient(135deg,#6366f1,#8b5cf6,#3b82f6)"></span>
                    <span class="swatch-name">Midnight</span>
                </button>
                <button class="theme-swatch" data-theme="rose" title="Rose">
                    <span class="swatch-colors"
                        style="background:linear-gradient(135deg,#f43f5e,#ec4899,#d946ef)"></span>
                    <span class="swatch-name">Rose</span>
                </button>
            </div>
        </div>

        <section class="hero" id="hero">
            <h1 class="hero-title">Ask me <span class="gradient-text">anything</span></h1>
            <p class="hero-subtitle">Get instant answers to your questions — capitals, science, history, and more.</p>

            <div class="search-container" id="search-container">
                <div class="search-bar" id="search-bar">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Say hi or ask a question..."
                        autocomplete="off" autofocus />
                    <button class="search-btn" id="search-btn" aria-label="Search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                    </button>
                </div>
                <div class="mode-toggle" id="mode-toggle">
                    <button class="mode-btn active" id="mode-conversation" data-mode="conversation">
                        <span class="mode-icon">💬</span> Conversation
                    </button>
                    <button class="mode-btn" id="mode-research" data-mode="research">
                        <span class="mode-icon">🔍</span> Research
                    </button>
                </div>
                <div class="suggestions" id="suggestions">
                    <span class="suggestion-label">Try saying:</span>
                    <button class="suggestion-chip" data-query="Hi!">Hi! 👋</button>
                    <button class="suggestion-chip" data-query="Tell me a joke">Tell me a joke</button>
                    <button class="suggestion-chip" data-query="What is the capital of France?">Capital of
                        France</button>
                    <button class="suggestion-chip" data-query="Tell me a fun fact">Fun fact</button>
                    <button class="suggestion-chip" data-query="What can you do?">What can you do?</button>
                </div>
            </div>
        </section>

        <section class="answer-section" id="answer-section">
            <div class="answer-card" id="answer-card">
                <div class="answer-header">
                    <div class="answer-icon">💡</div>
                    <h2 class="answer-question" id="answer-question"></h2>
                </div>
                <div class="answer-body" id="answer-body">
                    <p class="answer-text" id="answer-text"></p>
                </div>
                <div class="answer-footer">
                </div>
            </div>
        </section>

        <section class="history-section" id="history-section">
            <div class="history-header">
                <h3 class="history-title">Recent Questions</h3>
                <button class="clear-history-btn" id="clear-history-btn">🗑️ Clear All</button>
            </div>
            <div class="history-list" id="history-list"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
